name: Daily Investment Report

on:
  schedule:
    # 台灣時間每天 08:00 = UTC 00:00（週二至週五、週六）
    - cron: '0 0 * * 2-6'
  workflow_dispatch:
    inputs:
      date_override:
        description: '指定日期 YYYY-MM-DD（留空=今天）'
        required: false
        default: ''

jobs:
  generate-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATE_OVERRIDE: ${{ github.event.inputs.date_override }}
        run: python scripts/generate_report.py

      - name: Commit and push report
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "committed=false" >> $GITHUB_OUTPUT
            echo "No changes to commit, skipping notifications."
          else
            git commit -m "Daily report update"
            git push
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram notification
        if: steps.commit.outputs.committed == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SUMMARY: ${{ steps.generate.outputs.summary }}
          DATE_OVERRIDE: ${{ github.event.inputs.date_override }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram not configured, skipping."
            exit 0
          fi
          OWNER=$(echo $GITHUB_REPOSITORY | cut -d'/' -f1)
          REPO=$(echo $GITHUB_REPOSITORY | cut -d'/' -f2)
          # 手動補跑歷史日期時，通知顯示的日期要跟報告內容一致（不能永遠用「今天」）
          if [ -n "$DATE_OVERRIDE" ]; then
            DATE=$(date -d "$DATE_OVERRIDE" +'%Y/%m/%d')
          else
            DATE=$(TZ='Asia/Taipei' date +'%Y/%m/%d')
          fi
          URL="https://${OWNER}.github.io/${REPO}/"
          if [ -n "$SUMMARY" ]; then
            MSG=$(printf '投資情報已更新 %s\n\n%s\n\n點此查看完整報告 %s' "$DATE" "$SUMMARY" "$URL")
          else
            MSG=$(printf '投資情報已更新 %s\n\n每日 AI 投資情報自動生成完成\n\n點此查看完整報告 %s' "$DATE" "$URL")
          fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" -d chat_id="${TELEGRAM_CHAT_ID}" --data-urlencode "text=${MSG}"

      - name: Send LINE notification
        if: steps.commit.outputs.committed == 'true'
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SUMMARY: ${{ steps.generate.outputs.summary }}
          DATE_OVERRIDE: ${{ github.event.inputs.date_override }}
        run: |
          if [ -z "$LINE_CHANNEL_ACCESS_TOKEN" ]; then
            echo "LINE not configured, skipping."
            exit 0
          fi
          OWNER=$(echo $GITHUB_REPOSITORY | cut -d'/' -f1)
          REPO=$(echo $GITHUB_REPOSITORY | cut -d'/' -f2)
          URL="https://${OWNER}.github.io/${REPO}/"
          # 手動補跑歷史日期時，通知顯示的日期要跟報告內容一致（不能永遠用「今天」）
          if [ -n "$DATE_OVERRIDE" ]; then
            TITLE=$(date -d "$DATE_OVERRIDE" +'%Y.%m.%d')
          else
            TITLE=$(TZ='Asia/Taipei' date +'%Y.%m.%d')
          fi
          if [ -n "$SUMMARY" ]; then
            MSG=$(printf '%s 每日投資情報已更新 📊\n\n%s\n\n🔗 %s' "$TITLE" "$SUMMARY" "$URL")
          else
            MSG=$(printf '%s 每日投資情報已更新 📊\n\n🔗 %s' "$TITLE" "$URL")
          fi
          send_line() {
            jq -n --arg to "$1" --arg text "$MSG" \
              '{to: $to, messages: [{type: "text", text: $text}]}' \
              | curl -s -X POST https://api.line.me/v2/bot/message/push \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer ${LINE_CHANNEL_ACCESS_TOKEN}" \
                -d @-
          }
          if [ -n "$LINE_USER_ID" ]; then
            send_line "$LINE_USER_ID"
            echo "LINE 個人通知已發送"
          fi
          if [ -n "$LINE_GROUP_ID" ]; then
            IFS=',' read -ra GROUP_IDS <<< "$LINE_GROUP_ID"
            for GID in "${GROUP_IDS[@]}"; do
              GID=$(echo "$GID" | xargs)
              send_line "$GID"
              echo "LINE 群組通知已發送：$GID"
            done
          fi

      - name: Send Email notification
        if: steps.commit.outputs.committed == 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SUMMARY: ${{ steps.generate.outputs.summary }}
          DATE_OVERRIDE: ${{ github.event.inputs.date_override }}
        run: |
          if [ -z "$GMAIL_USER" ] || [ -z "$GMAIL_APP_PASSWORD" ]; then
            echo "Email not configured, skipping."
            exit 0
          fi
          python scripts/send_email.py

      - name: Send failure alert
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          # 用 printf 組多行訊息（比照 Telegram/LINE 步驟）：不能用直接換行的 MSG="..."
          # 字串——YAML 的 run: | 區塊裡，縮排不足的續行會終止整個區塊、讓 workflow
          # 檔案本身變成無法解析（Invalid workflow file）
          MSG=$(printf '投資情報 pipeline 執行失敗 ⚠️\n\n請檢查執行紀錄：%s' "$RUN_URL")

          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" -d chat_id="${TELEGRAM_CHAT_ID}" --data-urlencode "text=${MSG}"
          fi

          if [ -n "$LINE_CHANNEL_ACCESS_TOKEN" ]; then
            send_line() {
              jq -n --arg to "$1" --arg text "$MSG" \
                '{to: $to, messages: [{type: "text", text: $text}]}' \
                | curl -s -X POST https://api.line.me/v2/bot/message/push \
                  -H "Content-Type: application/json" \
                  -H "Authorization: Bearer ${LINE_CHANNEL_ACCESS_TOKEN}" \
                  -d @-
            }
            if [ -n "$LINE_USER_ID" ]; then
              send_line "$LINE_USER_ID"
            fi
            if [ -n "$LINE_GROUP_ID" ]; then
              IFS=',' read -ra GROUP_IDS <<< "$LINE_GROUP_ID"
              for GID in "${GROUP_IDS[@]}"; do
                GID=$(echo "$GID" | xargs)
                send_line "$GID"
              done
            fi
          fi
