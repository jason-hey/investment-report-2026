name: Daily Investment Report

on:
  schedule:
    # 台灣時間每天 08:00 = UTC 00:00（週二至週五、週六）
    - cron: '0 0 * * 2-6'
  workflow_dispatch:
    inputs:
      date_override:
        description: '指定日期 YYYY-MM-DD（留空=今天）'
        required: false
        default: ''

jobs:
  generate-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install "anthropic>=0.45.0" requests yfinance exchange-calendars

      - name: Generate report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATE_OVERRIDE: ${{ github.event.inputs.date_override }}
        run: python scripts/generate_report.py

      - name: Commit and push report
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "committed=false" >> $GITHUB_OUTPUT
            echo "No changes to commit, skipping notifications."
          else
            git commit -m "Daily report update"
            git push
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram notification
        if: steps.commit.outputs.committed == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram not configured, skipping."
            exit 0
          fi
          OWNER=$(echo $GITHUB_REPOSITORY | cut -d'/' -f1)
          REPO=$(echo $GITHUB_REPOSITORY | cut -d'/' -f2)
          DATE=$(TZ='Asia/Taipei' date +'%Y/%m/%d')
          URL="https://${OWNER}.github.io/${REPO}/"
          MSG=$(printf '投資情報已更新 %s\n\n每日 AI 投資情報自動生成完成\n\n點此查看完整報告 %s' "$DATE" "$URL")
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" -d chat_id="${TELEGRAM_CHAT_ID}" --data-urlencode "text=${MSG}"

      - name: Send LINE notification
        if: steps.commit.outputs.committed == 'true'
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ -z "$LINE_CHANNEL_ACCESS_TOKEN" ]; then
            echo "LINE not configured, skipping."
            exit 0
          fi
          OWNER=$(echo $GITHUB_REPOSITORY | cut -d'/' -f1)
          REPO=$(echo $GITHUB_REPOSITORY | cut -d'/' -f2)
          DATE=$(TZ='Asia/Taipei' date +'%Y/%m/%d')
          URL="https://${OWNER}.github.io/${REPO}/"
          TITLE=$(TZ='Asia/Taipei' date +'%Y.%m.%d')
          MSG="${TITLE} 每日投資情報已更新 📊\n\n🔗 ${URL}"
          send_line() {
            curl -s -X POST https://api.line.me/v2/bot/message/push \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${LINE_CHANNEL_ACCESS_TOKEN}" \
              -d "{\"to\":\"$1\",\"messages\":[{\"type\":\"text\",\"text\":\"${MSG}\"}]}"
          }
          if [ -n "$LINE_USER_ID" ]; then
            send_line "$LINE_USER_ID"
            echo "LINE 個人通知已發送"
          fi
          if [ -n "$LINE_GROUP_ID" ]; then
            send_line "$LINE_GROUP_ID"
            echo "LINE 群組通知已發送"
          fi

      - name: Send Email notification
        if: steps.commit.outputs.committed == 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ -z "$GMAIL_USER" ] || [ -z "$GMAIL_APP_PASSWORD" ]; then
            echo "Email not configured, skipping."
            exit 0
          fi
          python scripts/send_email.py
